<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7-Way Tank Roulette</title>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #111; color: #eee; padding: 20px; }
        .dashboard { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 15px; 
            margin-top: 20px;
        }
        .roulette-card { 
            background: #222; border: 2px solid #444; border-radius: 8px; padding: 15px; text-align: center; 
        }
        .roulette-card.active { border-color: #ff9900; }

        input { width: 90%; padding: 8px; margin-bottom: 10px; background: #333; border: 1px solid #555; color: #fff; border-radius: 4px; }
        
        .window { 
            height: 150px; overflow: hidden; background: #000; position: relative; border-radius: 4px; margin: 10px 0;
        }
        .strip { position: absolute; width: 100%; top: 0; will-change: transform;transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        .slot { height: 50px; line-height: 50px; font-size: 14px; border-bottom: 1px solid #222; color: #777; white-space: nowrap; }
        
        .marker { 
            position: absolute; top: 50px; height: 50px; width: 100%; border: 2px solid #ff9900; 
            background: rgba(255,153,0,0.1); pointer-events: none; z-index: 5;
        }

        .controls { text-align: center; margin-bottom: 30px; }
        button { padding: 15px 50px; background: #ff9900; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 20px; }
        button:disabled { background: #555; }
        
        .result-label { font-weight: bold; color: #ff9900; min-height: 1.2em; margin-top: 5px; font-size: 14px; }
    </style>
</head>
<body>
   <div style="background: #222; padding: 15px; text-align: center; border-bottom: 1px solid #444; display: flex; justify-content: center; align-items: center; gap: 20px; flex-wrap: wrap;">
    <div>
        <span>Room: </span><strong id="room-display" style="color: #ff9900;">---</strong>
        <button onclick="copyRoomLink()" style="font-size: 12px; padding: 5px 10px; margin-left: 5px; background: #444; width: auto;">Copy Link</button>
    </div>
    
    <div style="border-left: 1px solid #444; padding-left: 20px;">
        <input type="text" id="join-input" placeholder="Enter Room ID" style="width: 120px; margin: 0; padding: 5px;">
        <button onclick="joinRoom()" style="font-size: 14px; padding: 5px 15px; background: #555; width: auto;">Join Room</button>
    </div>
</div>
</div>

    <div class="controls">
        <h1>Team Tier X Roulette</h1>
        <button id="spin-all-btn">SPIN ALL 7</button>
    </div>

    <div class="dashboard" id="dashboard">
        </div>

    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="script.js"></script>
</body>
</html>
</body>
</html>
